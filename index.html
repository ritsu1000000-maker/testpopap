<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>無限ループ</title>
</head>
<body>

    <h1>処理中...</h1>

    <script>
        // 戻るボタンが押された（履歴が切り替わった）瞬間を検知する
        window.addEventListener('popstate', function() {
            // 戻ろうとしても、強制的にこのページ（現在の履歴）に留まらせる
            history.pushState(null, null, location.href);
        });

        // ページが読み込まれたら無限ポップアップを開始
        window.onload = function() {
            // 履歴に現在のページを登録して「戻る」の挙動をジャックする
            history.pushState(null, null, location.href);

            // 一番最初の、OKを押すしかない無限ループ
            while (true) {
                alert("ポップアップが流れています。");
            }
        };
    </script>

</body>
</html>
