<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>おいしいたけ</title>
    <style>
        /* 画面全体を覆って操作を禁止する */
        body {
            background-color: #f0f0f0;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
        }

        /* ポップアップを本物のダイアログ風にする */
        .popup-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            overflow: hidden;
            z-index: 9999;
        }

        /* タイトル部分「おいしいたけ」 */
        .popup-title {
            background-color: #f8f9fa;
            padding: 25px 20px; /* 余白を広げて文字がなくても綺麗に見えるように調整 */
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        /* 2択ボタンのエリア */
        .popup-buttons {
            display: flex;
            border-top: 1px solid #eee;
        }

        /* 105円・150円ボタン共通 */
        .choice-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: bold;
            color: #007aff; /* スマホ風の青文字 */
            cursor: pointer;
        }

        /* ボタン同士の間の区切り線 */
        .choice-btn:first-child {
            border-right: 1px solid #eee;
        }

        .choice-btn:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

    <!-- ポップアップ本体 -->
    <div class="popup-box">
        <div class="popup-title">おいしいたけ</div>
        <div class="popup-buttons">
            <button class="choice-btn" onclick="loopPopup()">105円</button>
            <button class="choice-btn" onclick="loopPopup()">150円</button>
        </div>
    </div>

    <script>
        // ブラウザの「戻る」ボタンを押されても戻らせない
        window.addEventListener('popstate', function() {
            history.pushState(null, null, location.href);
        });

        // ページ読み込み時に履歴をロック
        window.onload = function() {
            history.pushState(null, null, location.href);
        };

        // どちらのボタンを押してもページをリロードして無限ループ
        function loopPopup() {
            location.reload(); 
        }
    </script>

</body>
</html>
