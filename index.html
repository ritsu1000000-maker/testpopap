<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポップアップループ</title>
    <script>
        // ページが読み込まれた後に実行
        window.onload = function() {
            // alertを無限に表示し続ける
            while (true) {
                alert("ポップアップが表示されています！");
            }
        };
    </script>
</head>
<body>
    <h1>ポップアップテスト</h1>
</body>
</html>
